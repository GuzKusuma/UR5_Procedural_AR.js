<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>UR3 Augmented Reality Procedure</title>
    <style>
      :root {
        --bg: #0b1622;
        --panel: #13202f;
        --teal: #2fb6c4;
        --teal-dim: #1d6f78;
        --amber: #e0a33a;
        --green: #1d9e75;
        --ink: #e8eef4;
        --muted: #7f95a8;
        --line: #22364a;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        touch-action: manipulation;
      }
      #bgCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.5;
      }
      .vignette {
        position: absolute;
        inset: 0;
        z-index: 1;
        background: radial-gradient(
          ellipse at 50% 40%,
          transparent 30%,
          rgba(5, 12, 20, 0.85) 100%
        );
      }
      .wrap {
        position: relative;
        z-index: 2;
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        color: var(--teal);
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 600;
      }
      .eyebrow .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 10px var(--green);
        animation: pulse 1.8s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      h1 {
        font-size: clamp(30px, 7vw, 56px);
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: -1px;
        margin-bottom: 6px;
      }
      h1 .ur {
        color: var(--teal);
      }
      h1 .ar {
        color: var(--amber);
      }
      .subtitle {
        color: var(--muted);
        font-size: clamp(13px, 3.2vw, 16px);
        margin-bottom: 8px;
        max-width: 460px;
        line-height: 1.5;
      }
      .spec {
        color: var(--teal-dim);
        font-size: 12px;
        letter-spacing: 1px;
        margin-bottom: 40px;
        font-family: "Consolas", "Courier New", monospace;
      }
      .btns {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
        max-width: 320px;
      }
      .btn {
        position: relative;
        border: none;
        cursor: pointer;
        font-family: inherit;
        padding: 18px 24px;
        border-radius: 14px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.5px;
        transition:
          transform 0.12s ease,
          box-shadow 0.12s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-start {
        background: linear-gradient(135deg, var(--teal), var(--teal-dim));
        color: #06141a;
        box-shadow: 0 6px 24px rgba(47, 182, 196, 0.35);
      }
      .btn-set {
        background: transparent;
        color: var(--ink);
        border: 1.5px solid var(--line);
      }
      .btn-set:active {
        background: var(--panel);
      }
      .btn .ico {
        font-size: 20px;
      }
      .watermark {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 18px 24px 26px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.5px;
      }
      .watermark b {
        color: var(--ink);
        font-weight: 600;
      }
      .watermark .line {
        width: 40px;
        height: 1px;
        background: var(--line);
        margin: 0 auto 12px;
      }
      .overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(5, 11, 18, 0.75);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .overlay.show {
        display: flex;
      }
      .modal {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        width: 100%;
        max-width: 380px;
        padding: 26px;
      }
      .modal h2 {
        font-size: 20px;
        margin-bottom: 4px;
      }
      .modal .mh-sub {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 22px;
      }
      .lang-opt {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 16px 18px;
        border-radius: 12px;
        border: 1.5px solid var(--line);
        background: transparent;
        color: var(--ink);
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 12px;
        transition: 0.15s;
        text-align: left;
      }
      .lang-opt .flag {
        font-size: 22px;
      }
      .lang-opt .sub {
        display: block;
        font-size: 12px;
        color: var(--muted);
        font-weight: 400;
        margin-top: 2px;
      }
      .lang-opt.active {
        border-color: var(--teal);
        background: rgba(47, 182, 196, 0.1);
      }
      .lang-opt .check {
        margin-left: auto;
        color: var(--teal);
        font-size: 18px;
        opacity: 0;
      }
      .lang-opt.active .check {
        opacity: 1;
      }
      .modal-close {
        width: 100%;
        margin-top: 10px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: var(--teal);
        color: #06141a;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <canvas id="bgCanvas"></canvas>
    <div class="vignette"></div>

    <div class="wrap">
      <div class="eyebrow">
        <span class="dot"></span>
        <span id="t-eyebrow">Universal Robots &middot; CB3 Training</span>
      </div>
      <h1>
        <span class="ur">UR3</span> <span id="t-title1">Augmented Reality</span
        ><br /><span class="ar" id="t-title2">Procedure</span>
      </h1>
      <p class="subtitle" id="t-subtitle">
        Learn the robot motion programming procedure through an interactive
        guide anchored in real space.
      </p>
      <div class="spec">
        MoveL &middot; 4 Waypoints &middot; Blend Radius 50mm
      </div>

      <div class="btns">
        <button class="btn btn-start" onclick="startAR()">
          <span class="ico">&#9654;</span> <span id="t-start">Start</span>
        </button>
        <button class="btn btn-set" onclick="openSettings()">
          <span class="ico">&#9881;</span> <span id="t-settings">Settings</span>
        </button>
      </div>
    </div>

    <div class="watermark">
      <div class="line"></div>
      <span id="t-by">by</span> <b>Ida Bagus Kusuma Dewantara</b>
    </div>

    <div class="overlay" id="settingsOverlay">
      <div class="modal">
        <h2 id="t-settings-title">Settings</h2>
        <p class="mh-sub" id="t-settings-sub">
          Choose the language for the procedure instructions.
        </p>

        <button class="lang-opt active" id="optEn" onclick="selectLang('en')">
          <span class="flag">&#127468;&#127463;</span>
          <span>English<span class="sub">Default language</span></span>
          <span class="check">&#10003;</span>
        </button>

        <button class="lang-opt" id="optZh" onclick="selectLang('zh')">
          <span class="flag">&#127481;&#127484;</span>
          <span
            >&#32321;&#39636;&#20013;&#25991;<span class="sub"
              >Traditional Chinese</span
            ></span
          >
          <span class="check">&#10003;</span>
        </button>

        <button class="modal-close" id="t-done" onclick="closeSettings()">
          Done
        </button>
      </div>
    </div>

    <script>
      // ====== terjemahan menu ======
      var UI = {
        en: {
          eyebrow: "Universal Robots \u00b7 CB3 Training",
          title1: "Augmented Reality",
          title2: "Procedure",
          subtitle:
            "Learn the robot motion programming procedure through an interactive guide anchored in real space.",
          start: "Start",
          settings: "Settings",
          by: "by",
          settingsTitle: "Settings",
          settingsSub: "Choose the language for the procedure instructions.",
          done: "Done",
        },
        zh: {
          eyebrow: "Universal Robots \u00b7 CB3 \u8a13\u7df4",
          title1: "\u64f4\u589e\u5be6\u5883",
          title2: "\u64cd\u4f5c\u7a0b\u5e8f",
          subtitle:
            "\u900f\u904e\u9326\u5b9a\u65bc\u771f\u5be6\u7a7a\u9593\u7684\u4e92\u52d5\u5f0f\u6307\u5f15\uff0c\u5b78\u7fd2\u6a5f\u5668\u4eba\u904b\u52d5\u7de8\u7a0b\u7a0b\u5e8f\u3002",
          start: "\u958b\u59cb",
          settings: "\u8a2d\u5b9a",
          by: "\u4f5c\u8005",
          settingsTitle: "\u8a2d\u5b9a",
          settingsSub:
            "\u9078\u64c7\u7a0b\u5e8f\u6307\u5f15\u7684\u8a9e\u8a00\u3002",
          done: "\u5b8c\u6210",
        },
      };

      var selectedLang = "en";

      function applyLang(lang) {
        var d = UI[lang];
        document.getElementById("t-eyebrow").innerHTML = d.eyebrow;
        document.getElementById("t-title1").textContent = d.title1;
        document.getElementById("t-title2").textContent = d.title2;
        document.getElementById("t-subtitle").textContent = d.subtitle;
        document.getElementById("t-start").textContent = d.start;
        document.getElementById("t-settings").textContent = d.settings;
        document.getElementById("t-by").textContent = d.by;
        document.getElementById("t-settings-title").textContent =
          d.settingsTitle;
        document.getElementById("t-settings-sub").textContent = d.settingsSub;
        document.getElementById("t-done").textContent = d.done;
        document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
      }

      function selectLang(lang) {
        selectedLang = lang;
        document
          .getElementById("optEn")
          .classList.toggle("active", lang === "en");
        document
          .getElementById("optZh")
          .classList.toggle("active", lang === "zh");
        applyLang(lang); // langsung ubah tampilan menu juga
      }
      function openSettings() {
        document.getElementById("settingsOverlay").classList.add("show");
      }
      function closeSettings() {
        document.getElementById("settingsOverlay").classList.remove("show");
      }
      function startAR() {
        window.location.href = "webar.html?lang=" + selectedLang;
      }

      // ====== signature background ======
      var canvas = document.getElementById("bgCanvas");
      var ctx = canvas.getContext("2d");
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      /* ============================================================
         >>> PENGATURAN UKURAN BACKGROUND WAYPOINT - CUSTOM DI SINI <<<
         Ubah angka-angka di bawah untuk menyesuaikan ukuran & posisi
         lintasan waypoint di latar belakang menu.
         ============================================================ */
      var BG = {
        widthRatio: 0.7, // lebar lintasan relatif thd layar (0.3 = kecil, 0.7 = besar)
        maxWidth: 520, // batas maksimum lebar (piksel) - perbesar utk lintasan lebih besar
        heightRatio: 0.4, // tinggi relatif thd lebar (0.72 = persegi panjang 4:3)
        verticalPos: 0.4, // posisi vertikal pusat (0.3 = atas, 0.5 = tengah)
        waypointSize: 9, // radius titik waypoint (piksel) - perbesar utk titik lebih besar
        robotSize: 9, // radius robot bergerak (piksel)
        lineWidth: 2.5, // ketebalan garis lintasan
        gridSize: 40, // jarak grid latar (piksel) - perbesar utk grid lebih renggang
        speed: 0.004, // kecepatan robot di latar (lebih besar = lebih cepat)
      };
      /* ============================================================
         >>> AKHIR PENGATURAN UKURAN - di bawah ini jangan diubah <<<
         ============================================================ */

      function getPath() {
        var cx = canvas.width / 2,
          cy = canvas.height * BG.verticalPos;
        var w = Math.min(canvas.width * BG.widthRatio, BG.maxWidth);
        var h = w * BG.heightRatio;
        return [
          { x: cx - w / 2, y: cy - h / 2 },
          { x: cx + w / 2, y: cy - h / 2 },
          { x: cx + w / 2, y: cy + h / 2 },
          { x: cx - w / 2, y: cy + h / 2 },
          { x: cx - w / 2, y: cy - h / 2 },
        ];
      }
      var t = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var P = getPath();
        // grid
        ctx.strokeStyle = "rgba(34,54,74,0.4)";
        ctx.lineWidth = 1;
        var g = BG.gridSize;
        for (var x = 0; x < canvas.width; x += g) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (var y = 0; y < canvas.height; y += g) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
        // lintasan
        ctx.strokeStyle = "rgba(47,182,196,0.55)";
        ctx.lineWidth = BG.lineWidth;
        ctx.beginPath();
        ctx.moveTo(P[0].x, P[0].y);
        for (var i = 1; i < P.length; i++) ctx.lineTo(P[i].x, P[i].y);
        ctx.stroke();
        // waypoint
        var colors = ["#1D9E75", "#E0A33A", "#1D9E75", "#1D9E75"];
        for (var i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.arc(P[i].x, P[i].y, BG.waypointSize, 0, Math.PI * 2);
          ctx.fillStyle = colors[i];
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.3)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        // robot bergerak
        var seg = Math.floor(t) % 4,
          frac = t - Math.floor(t);
        var a = P[seg],
          b = P[seg + 1];
        var rx = a.x + (b.x - a.x) * frac,
          ry = a.y + (b.y - a.y) * frac;
        ctx.beginPath();
        ctx.arc(rx, ry, BG.robotSize, 0, Math.PI * 2);
        ctx.fillStyle = "#E24B4A";
        ctx.shadowColor = "#E24B4A";
        ctx.shadowBlur = 16;
        ctx.fill();
        ctx.shadowBlur = 0;
        t += BG.speed;
        if (t >= 4) t = 0;
        requestAnimationFrame(draw);
      }
      draw();

      var lastTouch = 0;
      document.addEventListener(
        "touchend",
        function (e) {
          var now = Date.now();
          if (now - lastTouch <= 300) {
            e.preventDefault();
          }
          lastTouch = now;
        },
        { passive: false },
      );
      document.addEventListener("gesturestart", function (e) {
        e.preventDefault();
      });
    </script>
  </body>
</html>
